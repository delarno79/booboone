name: Auto-Blog Publisher

# Runs 3x/day at 08:00, 14:00, 20:00 UTC. Adjust the times as needed.
# You can also trigger it manually from the Actions tab ("Run workflow").
on:
  schedule:
    - cron: "0 8,14,20 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max posts to publish this run (blank = one per category)"
        required: false
        default: ""

# Allow the workflow to commit the updated publishing state back to the repo.
permissions:
  contents: write

concurrency:
  group: auto-blog-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish articles
        env:
          # --- WordPress ---
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          # --- Text (DeepSeek) ---
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # --- Images (OpenAI) ---
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IMAGE_SOURCE: ${{ vars.IMAGE_SOURCE || 'openai' }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1-mini' }}
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY || 'medium' }}
          OPENAI_IMAGE_SIZE: ${{ vars.OPENAI_IMAGE_SIZE || '1536x1024' }}
          # --- Behaviour ---
          POST_STATUS: ${{ vars.POST_STATUS || 'publish' }}
        run: python main.py ${{ github.event.inputs.limit && format('--limit {0}', github.event.inputs.limit) || '' }}

      - name: Persist publishing state
        if: always()
        run: |
          git config user.name "auto-blog-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain keywords.state.json)" ]; then
            git add keywords.state.json
            git commit -m "chore: update publishing state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoblog-logs
          path: logs/
          retention-days: 14
          if-no-files-found: ignore
