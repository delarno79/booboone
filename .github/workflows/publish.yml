name: Auto-Blog Publisher

# Runs 3x/day, timed for a US (Eastern) audience:
#   12:00 UTC =  8:00 AM ET  (morning)
#   17:00 UTC =  1:00 PM ET  (midday)
#   23:00 UTC =  7:00 PM ET  (evening)
# NOTE: GitHub cron is always UTC and does NOT follow daylight saving. These
# times are correct for EDT (summer). During EST (winter) they land one hour
# earlier (7 AM / 12 PM / 6 PM ET) - shift each hour +1 if you want to correct it.
# You can also trigger it manually from the Actions tab ("Run workflow").
on:
  schedule:
    # Fires 10 minutes EARLY on purpose, so the posts actually LAND at the
    # target times (8:00 AM / 1:00 PM / 7:00 PM ET). GitHub delays jobs queued
    # on the hour, so starting at :50 absorbs that delay.
    #   11:50 UTC = 7:50 AM ET  -> posts land ~8:00 AM ET
    #   16:50 UTC = 12:50 PM ET -> posts land ~1:00 PM ET
    #   22:50 UTC = 6:50 PM ET  -> posts land ~7:00 PM ET
    - cron: "50 11,16,22 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max posts to publish this run (blank = one per category)"
        required: false
        default: ""

# Allow the workflow to commit the updated publishing state back to the repo.
permissions:
  contents: write

concurrency:
  group: auto-blog-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish articles
        env:
          # --- WordPress ---
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          # --- Text (DeepSeek) ---
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # --- Images: AtlasCloud (Z-Image Turbo) is the active provider ---
          ATLAS_API_KEY: ${{ secrets.ATLAS_API_KEY }}
          ATLAS_IMAGE_MODEL: ${{ vars.ATLAS_IMAGE_MODEL || 'z-image/turbo' }}
          ATLAS_IMAGE_SIZE: ${{ vars.ATLAS_IMAGE_SIZE || '1536*1024' }}
          IMAGE_SOURCE: ${{ vars.IMAGE_SOURCE || 'atlas' }}
          # --- Images: OpenAI (fallback provider; set IMAGE_SOURCE=openai to use) ---
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1-mini' }}
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY || 'medium' }}
          OPENAI_IMAGE_SIZE: ${{ vars.OPENAI_IMAGE_SIZE || '1536x1024' }}
          # --- Behaviour ---
          POST_STATUS: ${{ vars.POST_STATUS || 'publish' }}
        run: python main.py ${{ github.event.inputs.limit && format('--limit {0}', github.event.inputs.limit) || '' }}

      - name: Persist publishing state
        if: always()
        run: |
          git config user.name "auto-blog-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain keywords.state.json)" ]; then
            git add keywords.state.json
            git commit -m "chore: update publishing state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoblog-logs
          path: logs/
          retention-days: 14
          if-no-files-found: ignore
